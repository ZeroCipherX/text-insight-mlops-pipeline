name: CI/CD to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ca769b7611a3acr.azurecr.io
          username: ca769b7611a3acr
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ca769b7611a3acr.azurecr.io/text-insight-app:latest .
          docker push ca769b7611a3acr.azurecr.io/text-insight-app:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ca769b7611a3acr.azurecr.io/text-insight-app:latest
          containerAppName: text-insight-app
          resourceGroup: TextInsightRG